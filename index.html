<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的成长日记</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- 全屏动态星空背景 - 固定不动 -->
  <div id="starfield-container">
    <canvas id="starfield"></canvas>
  </div>

  <!-- 音乐触发按钮（右侧中部小圆图标，默认显示） -->
  <button id="music-toggle-btn" title="音乐控制" aria-label="展开音乐控件">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
      <path d="M12 3v18M5 9v6M19 9v6"/>
    </svg>
  </button>

  <!-- 音乐控件面板（默认隐藏在右侧外） -->
  <div id="music-panel">
    <div class="music-player-inner">
      <button id="prev-track" title="上一首" class="btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 9 6V6l-9 6z"/>
        </svg>
      </button>

      <button id="toggle-music" title="播放 / 暂停" class="btn play-pause">
        <svg class="play" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg class="pause" viewBox="0 0 24 24" width="28" height="28" fill="currentColor" style="display:none;">
          <path d="M6 4h4v16H6zm8 0h4v16h-4z"/>
        </svg>
      </button>

      <button id="next-track" title="下一首" class="btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M6 18l9-6-9-6v12zm9 0h2V6h-2v12z"/>
        </svg>
      </button>

      <button id="mode-toggle" title="切换模式（单曲循环 ↔ 随机）" class="btn mode">
        <svg class="icon-loop" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M17 4l-5 5-1.41-1.41L13.17 6H7c-2.21 0-4 1.79-4 4s1.79 4 4 4h10c2.21 0 4-1.79 4-4s-1.79-4-4-4h-2.83l-2.58-2.59L12 4z"/>
        </svg>
        <svg class="icon-random" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" style="display:none;">
          <path d="M14 20v-3h-3v-2h3v-3h2v3h3v2h-3v3h-2zm-9-3v-2h5v2H5zm0-4v-2h8v2H5zM5 9V7h11v2H5z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 背景音乐音频元素 -->
  <audio id="bgm" preload="auto"></audio>

  <!-- 左侧导航触发按钮（左中侧，可拖动，默认显示） -->
  <button id="sidebar-toggle-btn" title="导航菜单" aria-label="展开左侧导航">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
      <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
    </svg>
  </button>

  <!-- 左侧导航 - 只保留 All 和 About -->
  <nav class="sidebar">
    <div class="sidebar-inner">
      <a href="#all" data-link class="nav-item active" id="all-diaries-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45 1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
        </svg>
        <span>All</span>
      </a>

      <a href="about.md" data-link class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <span>ABOUT</span>
      </a>
    </div>
  </nav>

  <!-- 星空调节触发按钮（右上角，默认显示） -->
  <button id="starfield-toggle-btn" title="调节星空" aria-label="展开星空调节">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
    </svg>
  </button>

  <!-- 星空调节面板（完整版，不省略滑块） -->
  <div id="starfield-controls">
    <div class="panel-header">
      <div>星空调节</div>
      <button id="starfield-close-btn">×</button>
    </div>

    <div class="slider-group">
      <div>速度大小</div>
      <input type="range" id="ctrl-starspeed-abs" min="0" max="2" step="0.05" value="0.6">
      <span id="val-starspeed-abs">0.6</span>
    </div>

    <div class="slider-group">
      <div>方向</div>
      <select id="ctrl-stardir">
        <option value="1">向前（靠近）</option>
        <option value="-1">向后（远离）</option>
      </select>
      <span id="val-stardir">向前</span>
    </div>

    <div class="slider-group">
      <div>左右漂移</div>
      <input type="range" id="ctrl-hdrift" min="-0.8" max="0.8" step="0.02" value="0">
      <span id="val-hdrift">0.0</span>
    </div>

    <div class="slider-group">
      <div>上下漂移</div>
      <input type="range" id="ctrl-vdrift" min="-0.8" max="0.8" step="0.02" value="0">
      <span id="val-vdrift">0.0</span>
    </div>

    <div class="slider-group">
      <div>流星密度</div>
      <input type="range" id="ctrl-meteorfreq" min="0" max="0.03" step="0.0005" value="0.006">
      <span id="val-meteorfreq">0.006</span>
    </div>

    <div class="slider-group">
      <div>星空透出程度（越小文字越清晰）</div>
      <input type="range" id="ctrl-content-opacity" min="0" max="0.9" step="0.01" value="0.65">
      <span id="val-content-opacity">0.65</span>
    </div>
  </div>

  <!-- 主要内容区域 -->
  <main id="content">
    <!-- 默认会由 main.js 加载 about.md 或日记列表 -->
  </main>

  <div id="quote-container">
    <div id="quote-content">加载中...</div>
    <div id="quote-author"></div>
  </div>

  <!-- 脚本引入 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="assets/js/starfield.js"></script>
  <script src="assets/js/music.js"></script>
  <script src="assets/js/main.js"></script>

  <!-- 左侧导航切换脚本（仅此部分优化：动态弹出方向，避免覆盖/隐藏） -->
  <script>
    const sidebar = document.querySelector('.sidebar');
    const sidebarToggle = document.getElementById('sidebar-toggle-btn');
    if (sidebar && sidebarToggle) {
      let isDragging = false;
      let startX, startY, initialLeft, initialTop;
      const sidebarGap = 12; // 球和栏目的间隔
      const sidebarWidth = 195 + 32; // width + padding*2 approx

      // 切换导航 + 隐藏/显示球 + 动态位置 + 智能弹出方向
      const toggleSidebar = () => {
        const toggleRect = sidebarToggle.getBoundingClientRect();
        const centerY = toggleRect.top + toggleRect.height / 2;
        sidebar.style.top = `${centerY}px`;
        sidebar.style.transform = 'translateY(-50%)';

        const isShow = !sidebar.classList.contains('show');
        const isLeftSide = toggleRect.left < window.innerWidth / 2;

        let showLeft, hideLeft;
        if (isLeftSide) {
          // 球在左侧，从右侧弹出
          hideLeft = toggleRect.left - sidebarWidth - sidebarGap;
          showLeft = toggleRect.left + toggleRect.width + sidebarGap;
        } else {
          // 球在右侧，从左侧弹出
          hideLeft = toggleRect.left + toggleRect.width + sidebarGap;
          showLeft = toggleRect.left - sidebarWidth - sidebarGap;
        }

        if (isShow) {
          // 先设置隐藏位置（动画起点）
          sidebar.style.left = `${hideLeft}px`;
          sidebar.classList.add('show');
          // 下一帧设置显示位置（动画终点）
          requestAnimationFrame(() => {
            sidebar.style.left = `${showLeft}px`;
          });
          sidebarToggle.style.opacity = '0';
          sidebarToggle.style.pointerEvents = 'none';
        } else {
          // 先设置显示位置（动画起点）
          sidebar.style.left = `${showLeft}px`;
          // 下一帧设置隐藏位置（动画终点）
          requestAnimationFrame(() => {
            sidebar.style.left = `${hideLeft}px`;
          });
          // 动画结束后移除show类
          setTimeout(() => {
            sidebar.classList.remove('show');
            sidebarToggle.style.opacity = '1';
            sidebarToggle.style.pointerEvents = 'auto';
          }, 450); // 匹配transition时长0.45s
        }
      };

      // 点击打开/关闭
      sidebarToggle.addEventListener('click', (e) => {
        if (!isDragging) {
          e.stopPropagation();
          toggleSidebar();
        }
      });

      // === 自由拖动逻辑（鼠标 + 触摸）===
      const startDrag = (clientX, clientY) => {
        if (sidebar.classList.contains('show')) return; // 展开时不允许拖动
        isDragging = true;
        startX = clientX;
        startY = clientY;
        const rect = sidebarToggle.getBoundingClientRect();
        initialLeft = rect.left;
        initialTop = rect.top;

        // 切换为绝对像素定位（移除初始 translateY）
        sidebarToggle.style.transition = 'none';
        sidebarToggle.style.transform = 'none';
        sidebarToggle.style.left = `${initialLeft}px`;
        sidebarToggle.style.top = `${initialTop}px`;
        sidebarToggle.classList.add('dragging');
      };

      const doDrag = (clientX, clientY) => {
        if (!isDragging) return;
        const dx = clientX - startX;
        const dy = clientY - startY;
        let newLeft = initialLeft + dx;
        let newTop = initialTop + dy;

        // 软限制在视口内（防止完全拖出屏幕，体验更好，但不吸附边缘）
        newLeft = Math.max(10, Math.min(window.innerWidth - 72, newLeft));
        newTop = Math.max(10, Math.min(window.innerHeight - 72, newTop));

        sidebarToggle.style.left = `${newLeft}px`;
        sidebarToggle.style.top = `${newTop}px`;
      };

      const stopDrag = () => {
        if (!isDragging) return;
        isDragging = false;
        sidebarToggle.style.transition = 'all 0.3s ease';
        sidebarToggle.classList.remove('dragging');
      };

      // 鼠标拖动
      sidebarToggle.addEventListener('mousedown', (e) => { startDrag(e.clientX, e.clientY); });
      document.addEventListener('mousemove', (e) => { doDrag(e.clientX, e.clientY); });
      document.addEventListener('mouseup', stopDrag);

      // 触摸拖动（移动端支持）
      sidebarToggle.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        startDrag(touch.clientX, touch.clientY);
      });
      document.addEventListener('touchmove', (e) => {
        if (isDragging && e.touches.length) {
          const touch = e.touches[0];
          doDrag(touch.clientX, touch.clientY);
          e.preventDefault();
        }
      });
      document.addEventListener('touchend', stopDrag);

      // 点击空白处关闭导航
      document.addEventListener('click', (e) => {
        if (!sidebar.contains(e.target) && e.target !== sidebarToggle) {
          if (sidebar.classList.contains('show')) {
            toggleSidebar();
          }
        }
      });
    }
  </script>

</body>
</html>
