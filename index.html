<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的成长日记</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css">
</head>
<body>
  <!-- 全屏动态星空背景 - 固定不动 -->
  <div id="starfield-container">
    <canvas id="starfield"></canvas>
  </div>

  <!-- 音乐触发按钮（右侧中部小圆图标，默认显示） -->
  <button id="music-toggle-btn" title="音乐控制" aria-label="展开音乐控件">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
      <path d="M12 3v18M5 9v6M19 9v6"/>
    </svg>
  </button>

  <!-- 音乐控件面板（默认隐藏在右侧外） -->
  <div id="music-panel">
    <div class="music-player-inner">
      <button id="prev-track" title="上一首" class="btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 9 6V6l-9 6z"/>
        </svg>
      </button>
      <button id="toggle-music" title="播放 / 暂停" class="btn play-pause">
        <svg class="play" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg class="pause" viewBox="0 0 24 24" width="28" height="28" fill="currentColor" style="display:none;">
          <path d="M6 4h4v16H6zm8 0h4v16h-4z"/>
        </svg>
      </button>
      <button id="next-track" title="下一首" class="btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M6 18l9-6-9-6v12zm9 0h2V6h-2v12z"/>
        </svg>
      </button>
      <button id="mode-toggle" title="切换模式（单曲循环 ↔ 随机）" class="btn mode">
        <svg class="icon-loop" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M17 4l-5 5-1.41-1.41L13.17 6H7c-2.21 0-4 1.79-4 4s1.79 4 4 4h10c2.21 0 4-1.79 4-4s-1.79-4-4-4h-2.83l-2.58-2.59L12 4z"/>
        </svg>
        <svg class="icon-random" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" style="display:none;">
          <path d="M14 20v-3h-3v-2h3v-3h2v3h3v2h-3v3h-2zm-9-3v-2h5v2H5zm0-4v-2h8v2H5zM5 9V7h11v2H5z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 背景音乐音频元素 -->
  <audio id="bgm" preload="auto"></audio>

  <!-- 左侧导航触发按钮（左中侧，可拖动，默认显示） -->
  <button id="sidebar-toggle-btn" title="导航菜单" aria-label="展开左侧导航">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
      <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
    </svg>
  </button>

  <!-- 左侧导航 - 只保留 All 和 About -->
  <nav class="sidebar">
    <div class="sidebar-inner">
      <a href="#all" data-link class="nav-item active" id="all-diaries-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45 1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
        </svg>
        <span>All</span>
      </a>
      <a href="about.md" data-link class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <span>ABOUT</span>
      </a>
    </div>
  </nav>

  <!-- 星空调节触发按钮（右上角，默认显示） -->
  <button id="starfield-toggle-btn" title="调节星空" aria-label="展开星空调节">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
    </svg>
  </button>

  <!-- 星空调节面板（完整版，不省略滑块） -->
  <div id="starfield-controls">
    <div class="panel-header">
      <div>星空调节</div>
      <button id="starfield-close-btn">×</button>
    </div>
    <div class="slider-group">
      <div>速度大小</div>
      <input type="range" id="ctrl-starspeed-abs" min="0" max="2" step="0.05" value="0.6">
      <span id="val-starspeed-abs">0.6</span>
    </div>
    <div class="slider-group">
      <div>方向</div>
      <select id="ctrl-stardir">
        <option value="1">向前（靠近）</option>
        <option value="-1">向后（远离）</option>
      </select>
      <span id="val-stardir">向前</span>
    </div>
    <div class="slider-group">
      <div>左右漂移</div>
      <input type="range" id="ctrl-hdrift" min="-0.8" max="0.8" step="0.02" value="0">
      <span id="val-hdrift">0.0</span>
    </div>
    <div class="slider-group">
      <div>上下漂移</div>
      <input type="range" id="ctrl-vdrift" min="-0.8" max="0.8" step="0.02" value="0">
      <span id="val-vdrift">0.0</span>
    </div>
    <div class="slider-group">
      <div>流星密度</div>
      <input type="range" id="ctrl-meteorfreq" min="0" max="0.03" step="0.0005" value="0.006">
      <span id="val-meteorfreq">0.006</span>
    </div>
    <div class="slider-group">
      <div>启用星云</div>
      <input type="checkbox" id="ctrl-nebula">
      <span id="val-nebula">已关闭</span>
    </div>
    <!-- 新增：刷新星云按钮（默认隐藏） -->
    <div class="slider-group" id="nebula-refresh-group" style="display: none;">
      <button id="btn-refresh-nebula" style="width: 100%; padding: 8px; background: rgba(100, 80, 180, 0.4); border: 1px solid rgba(180, 140, 220, 0.5); color: white; border-radius: 6px; cursor: pointer;">
      刷新星云
      </button>
    </div>
    <div class="slider-group">
      <div>星空透出程度（越小文字越清晰）</div>
      <input type="range" id="ctrl-content-opacity" min="0" max="0.9" step="0.01" value="0">
      <span id="val-content-opacity">0</span>
    </div>
  </div>

  <!-- 主要内容区域 -->
  <main id="content">
    <!-- 默认会由 main.js 加载 about.md 或日记列表 -->
  </main>

  <div id="quote-container">
    <div id="quote-content">加载中...</div>
    <div id="quote-author"></div>
  </div>

  <!-- 脚本引入 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="assets/js/starfield.js"></script>
  <script src="assets/js/music.js"></script>
  <script src="assets/js/main.js"></script>
  <!-- 左侧导航切换脚本 -->
  <script src="assets/js/sidebar.js"></script>

  <svg id="magnet-connection" 
     style="position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9990; overflow: visible;">
  </svg>

  <!-- 新增：动态注入星空控件美化样式（与搜索框风格一致） -->
  <script>
    // 只在 DOM 加载后注入一次，避免重复
    if (!document.getElementById('starfield-controls-style')) {
      const style = document.createElement('style');
      style.id = 'starfield-controls-style';
      style.innerHTML = `
        /* 星空调节触发按钮 - 玻璃摩卡 + 呼吸光环 */
        #starfield-toggle-btn {
          position: fixed;
          top: 16px;
          right: 16px;
          width: 48px;
          height: 48px;
          border-radius: 50%;
          background: linear-gradient(135deg, rgba(40,40,80,0.75), rgba(20,20,50,0.75));
          backdrop-filter: blur(12px);
          border: 1px solid rgba(167,139,250,0.35);
          color: #a78bfa;
          font-size: 1.3rem;
          cursor: pointer;
          box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 0 0 rgba(167,139,250,0.3);
          transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
          z-index: 10000;
          display: flex;
          align-items: center;
          justify-content: center;
          user-select: none;
        }

        #starfield-toggle-btn:hover {
          transform: scale(1.12) translateY(-2px);
          box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 20px rgba(167,139,250,0.6);
          color: #ffffff;
          animation: pulse-ring 2s infinite;
        }

        #starfield-toggle-btn:active {
          transform: scale(0.94);
          box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        @keyframes pulse-ring {
          0% { box-shadow: 0 0 0 0 rgba(167,139,250,0.4); }
          70% { box-shadow: 0 0 0 12px rgba(167,139,250,0); }
          100% { box-shadow: 0 0 0 0 rgba(167,139,250,0); }
        }

        /* 星空调节面板 - 玻璃感 + 出现动画优化 */
        #starfield-controls {
          position: fixed;
          top: 70px;
          right: 16px;
          background: linear-gradient(135deg, rgba(20,20,50,0.92), rgba(10,10,30,0.92));
          backdrop-filter: blur(16px);
          border: 1px solid rgba(167,139,250,0.35);
          border-radius: 16px;
          padding: 16px 20px;
          color: #d0e0ff;
          font-size: 13px;
          z-index: 9999;
          min-width: 240px;
          max-width: 300px;
          box-shadow: 0 12px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(167,139,250,0.1);
          opacity: 0;
          transform: translateY(-20px) scale(0.95);
          transition: all 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
          pointer-events: none;
          overflow: hidden;
        }

        #starfield-controls[style*="opacity: 1"],
        #starfield-controls[style*="opacity:1"] {
          opacity: 1 !important;
          transform: translateY(0) scale(1) !important;
          pointer-events: auto !important;
        }

        /* 面板头部美化 */
        .panel-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 12px;
          font-weight: 600;
          color: #a78bfa;
          font-size: 1.1rem;
        }

        #starfield-close-btn {
          background: none;
          border: none;
          color: #a78bfa;
          font-size: 1.4rem;
          cursor: pointer;
          opacity: 0.8;
          transition: all 0.2s;
        }

        #starfield-close-btn:hover {
          opacity: 1;
          transform: rotate(90deg);
          color: #ffffff;
        }

        /* 滑块组 - 轻微hover效果 */
        .slider-group {
          margin: 12px 0;
          padding: 8px 12px;
          border-radius: 10px;
          transition: background 0.25s ease;
        }

        .slider-group:hover {
          background: rgba(167,139,250,0.08);
        }

        .slider-group div {
          margin-bottom: 6px;
          font-size: 13px;
          opacity: 0.9;
          color: #d0e0ff;
        }

        /* 输入滑块美化（与主题统一） */
        .slider-group input[type="range"] {
          width: 100%;
          height: 6px;
          background: rgba(167,139,250,0.2);
          border-radius: 3px;
          outline: none;
          appearance: none;
          transition: background 0.3s ease;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
          appearance: none;
          width: 16px;
          height: 16px;
          background: #a78bfa;
          border-radius: 50%;
          cursor: pointer;
          box-shadow: 0 0 10px rgba(167,139,250,0.6);
          border: 2px solid #ffffff;
          transition: all 0.2s;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb:hover {
          transform: scale(1.2);
          box-shadow: 0 0 15px rgba(167,139,250,0.8);
        }

        /* 复选框和按钮美化（与整体一致） */
        .slider-group input[type="checkbox"] {
          accent-color: #a78bfa;
        }

        #btn-refresh-nebula {
          background: linear-gradient(135deg, rgba(167,139,250,0.25), rgba(100,80,180,0.25)) !important;
          border: 1px solid rgba(167,139,250,0.4) !important;
          transition: all 0.3s ease;
        }

        #btn-refresh-nebula:hover {
          background: linear-gradient(135deg, rgba(167,139,250,0.45), rgba(100,80,180,0.45)) !important;
          transform: translateY(-1px);
          box-shadow: 0 4px 12px rgba(167,139,250,0.3);
        }

        #btn-refresh-nebula:active {
          transform: translateY(0);
        }
      `;
      document.head.appendChild(style);
    }
  </script>

</body>
</html>
