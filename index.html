<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的成长日记</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css">
</head>
<body>
  <!-- 全屏动态星空背景 - 固定不动 -->
  <div id="starfield-container">
    <canvas id="starfield"></canvas>
  </div>

  <!-- 音乐触发按钮（右侧中部小圆图标，默认显示） -->
  <button id="music-toggle-btn" title="音乐控制" aria-label="展开音乐控件">
    <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
      <path d="M12 3v18M5 9v6M19 9v6"/>
    </svg>
  </button>

  <!-- 音乐控件面板（默认隐藏在右侧外） -->
  <div id="music-panel">
    <div class="music-player-inner">
      <button id="prev-track" title="上一首" class="btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 9 6V6l-9 6z"/>
        </svg>
      </button>
      <button id="toggle-music" title="播放 / 暂停" class="btn play-pause">
        <svg class="play" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg class="pause" viewBox="0 0 24 24" width="28" height="28" fill="currentColor" style="display:none;">
          <path d="M6 4h4v16H6zm8 0h4v16h-4z"/>
        </svg>
      </button>
      <button id="next-track" title="下一首" class="btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M6 18l9-6-9-6v12zm9 0h2V6h-2v12z"/>
        </svg>
      </button>
      <button id="mode-toggle" title="切换模式（单曲循环 ↔ 随机）" class="btn mode">
        <svg class="icon-loop" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M17 4l-5 5-1.41-1.41L13.17 6H7c-2.21 0-4 1.79-4 4s1.79 4 4 4h10c2.21 0 4-1.79 4-4s-1.79-4-4-4h-2.83l-2.58-2.59L12 4z"/>
        </svg>
        <svg class="icon-random" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" style="display:none;">
          <path d="M14 20v-3h-3v-2h3v-3h2v3h3v2h-3v3h-2zm-9-3v-2h5v2H5zm0-4v-2h8v2H5zM5 9V7h11v2H5z"/>
        </svg>
      </button>

      <!-- 模式文字提示（新增） -->
      <div id="mode-status" aria-live="polite" style="margin-left:8px; font-size:12px; align-self:center; opacity:0.95;">
        单曲循环
      </div>
    </div>
  </div>

  <!-- 背景音乐音频元素 -->
  <audio id="bgm" preload="auto"></audio>

  <!-- 左侧导航触发按钮（左中侧，可拖动，默认显示） -->
  <button id="sidebar-toggle-btn" title="导航菜单" aria-label="展开左侧导航">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
      <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
    </svg>
  </button>

  <!-- 左侧导航 - 只保留 All 和 About -->
  <nav class="sidebar">
    <div class="sidebar-inner">
      <a href="#all" data-link class="nav-item active" id="all-diaries-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45 1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
        </svg>
        <span>All</span>
      </a>
      <a href="about.md" data-link class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <span>ABOUT</span>
      </a>
    </div>
  </nav>

  <!-- 星空调节触发按钮（右上角，默认显示） - 十字星光形状 -->
  <button id="starfield-toggle-btn" title="调节星空" aria-label="展开星空调节">
    <svg viewBox="0 0 48 48" width="24" height="24" fill="currentColor" aria-hidden="true">
      <!-- 四条尖光束 / 菱形光角 -->
      <polygon points="24,2 26,18 24,16 22,18" />
      <polygon points="24,46 26,30 24,32 22,30" />
      <polygon points="2,24 18,26 16,24 18,22" />
      <polygon points="46,24 30,26 32,24 30,22" />
      <!-- 中心小亮点 -->
      <circle cx="24" cy="24" r="2" fill="currentColor"/>
    </svg>
  </button>


  <!-- 优化后的星空调节面板：更小巧、压缩布局（不改触发按钮和出现动画） -->
  <div id="starfield-controls">
    <div class="panel-header">
      <div>星空调节</div>
      <button id="starfield-close-btn">×</button>
    </div>
    <div class="slider-group">
      <div>速度</div>
      <input type="range" id="ctrl-starspeed-abs" min="0" max="2" step="0.05" value="0.6">
      <span id="val-starspeed-abs">0.6</span>
    </div>
    <div class="slider-group">
      <div>方向</div>
      <select id="ctrl-stardir">
        <option value="1">向前</option>
        <option value="-1">向后</option>
      </select>
      <span id="val-stardir">向前</span>
    </div>

<!-- 水平漂移 -->
<div class="slider-group">
  <label for="ctrl-hdrift">水平漂移</label>
  <div class="slider-wrapper">
    <input type="range" id="ctrl-hdrift" min="-2" max="2" step="0.01" value="0">
    <div class="right-controls">
      <span id="val-hdrift">0</span>
      <button id="btn-reset-horizontal" class="reset-btn" title="归零">⟲</button>
    </div>
  </div>
</div>

<!-- 垂直漂移 -->
<div class="slider-group">
  <label for="ctrl-vdrift">垂直漂移</label>
  <div class="slider-wrapper">
    <input type="range" id="ctrl-vdrift" min="-2" max="2" step="0.01" value="0">
    <div class="right-controls">
      <span id="val-vdrift">0</span>
      <button id="btn-reset-vertical" class="reset-btn" title="归零">⟲</button>
    </div>
  </div>
</div>

<!-- 星空旋转 -->
<div class="slider-group">
  <label for="ctrl-rotation-speed">星空旋转</label>
  <div class="slider-wrapper">
    <input type="range" id="ctrl-rotation-speed" min="-0.02" max="0.02" step="0.0005" value="0">
    <div class="right-controls">
      <span id="val-rotation-speed">0.0000</span>
      <button id="btn-reset-rotation" class="reset-btn" title="归零">⟲</button>
    </div>
  </div>
</div>

    <div class="slider-group">
      <div>流星</div>
      <input type="range" id="ctrl-meteorfreq" min="0" max="0.03" step="0.0005" value="0.006">
      <span id="val-meteorfreq">0.006</span>
    </div>
    <div class="slider-group">
      <div>星星数</div>
      <input type="range" id="ctrl-starcount" min="500" max="4000" step="100" value="2000">
      <span id="val-starcount">2000</span>
    </div>
    <div class="slider-group compact">
      <div>星云</div>
      <label style="display:flex;align-items:center;gap:6px;">
        <input type="checkbox" id="ctrl-nebula" checked>
        <span id="val-nebula">启用</span>
      </label>
    </div>
    <div id="nebula-refresh-group" style="margin-top:4px;">
      <button id="btn-refresh-nebula">刷新星云</button>
    </div>
    <div class="slider-group">
      <div>透出度</div>
      <input type="range" id="ctrl-content-opacity" min="0" max="0.9" step="0.01" value="0">
      <span id="val-content-opacity">0</span>
    </div>
  </div>

  <!-- 主要内容区域 -->
  <main id="content">
    <!-- 默认会由 main.js 加载 about.md 或日记列表 -->
  </main>

  <div id="quote-container">
    <div id="quote-content">加载中...</div>
    <div id="quote-author"></div>
  </div>

  <!-- 脚本引入 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="assets/js/starfield.js"></script>
  <script src="assets/js/music.js"></script>
  <script src="assets/js/main.js"></script>
  <!-- 左侧导航切换脚本 -->
  <script src="assets/js/sidebar.js"></script>

  <svg id="magnet-connection" 
     style="position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9990; overflow: visible;">
  </svg>

  <!-- 动态注入星空控件美化样式（保留原触发按钮特效，只压缩面板内部） -->
  <script>
    if (!document.getElementById('starfield-controls-style')) {
      const style = document.createElement('style');
      style.id = 'starfield-controls-style';
      style.innerHTML = `
        /* 保留原触发按钮所有样式和特效 */
        #starfield-toggle-btn {
          position: fixed;
          top: 16px;
          right: 16px;
          width: 48px;
          height: 48px;
          /* 将圆形改为非圆形（保留大小、位置与视觉特效） */
          border-radius: 8px;
          background: linear-gradient(135deg, rgba(40,40,80,0.75), rgba(20,20,50,0.75));
          backdrop-filter: blur(12px);
          border: 1px solid rgba(167,139,250,0.35);
          color: #a78bfa;
          font-size: 1.3rem;
          cursor: pointer;
          box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 0 0 rgba(167,139,250,0.3);
          transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
          z-index: 10000;
          display: flex;
          align-items: center;
          justify-content: center;
          user-select: none;
        }

        #starfield-toggle-btn:hover {
          transform: scale(1.12) translateY(-2px);
          box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 20px rgba(167,139,250,0.6);
          color: #ffffff;
          animation: pulse-ring 2s infinite;
        }

        #starfield-toggle-btn:active {
          transform: scale(0.94);
          box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        @keyframes pulse-ring {
          0% { box-shadow: 0 0 0 0 rgba(167,139,250,0.4); }
          70% { box-shadow: 0 0 0 12px rgba(167,139,250,0); }
          100% { box-shadow: 0 0 0 0 rgba(167,139,250,0); }
        }

        /* 面板主体 - 压缩尺寸，保持玻璃感、动画、阴影等原有特效 */
        #starfield-controls {
          position: fixed;
          top: 70px;
          right: 16px;
          background: linear-gradient(135deg, rgba(20,20,50,0.92), rgba(10,10,30,0.92));
          backdrop-filter: blur(16px);
          border: 1px solid rgba(167,139,250,0.35);
          border-radius: 16px;
          padding: 12px 14px;
          color: #d0e0ff;
          font-size: 12.5px;
          z-index: 9999;
          width: 220px;
          box-shadow: 0 12px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(167,139,250,0.1);
          opacity: 0;
          transform: translateY(-20px) scale(0.95);
          transition: all 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
          pointer-events: none;
          overflow: hidden;
        }

        #starfield-controls[style*="opacity: 1"],
        #starfield-controls[style*="opacity:1"] {
          opacity: 1 !important;
          transform: translateY(0) scale(1) !important;
          pointer-events: auto !important;
        }

        .panel-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 10px;
          font-weight: 600;
          color: #a78bfa;
          font-size: 13.5px;
        }

        #starfield-close-btn {
          background: none;
          border: none;
          color: #a78bfa;
          font-size: 1.4rem;
          cursor: pointer;
          opacity: 0.8;
          transition: all 0.2s;
        }

        #starfield-close-btn:hover {
          opacity: 1;
          transform: rotate(90deg);
          color: #ffffff;
        }

        .slider-group {
          margin: 8px 0;
          padding: 6px 8px;
          border-radius: 10px;
          transition: background 0.25s ease;
        }

        .slider-group:hover {
          background: rgba(167,139,250,0.08);
        }

        .slider-group div {
          margin-bottom: 4px;
          font-size: 12.5px;
          opacity: 0.9;
        }

        .slider-group.compact {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 4px 8px;
          margin: 4px 0;
        }

        .slider-group input[type="range"] {
          width: 100%;
          height: 6px;
          background: rgba(167,139,250,0.2);
          border-radius: 3px;
          outline: none;
          appearance: none;
          transition: background 0.3s ease;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
          appearance: none;
          width: 16px;
          height: 16px;
          background: #a78bfa;
          border-radius: 50%;
          cursor: pointer;
          box-shadow: 0 0 10px rgba(167,139,250,0.6);
          border: 2px solid #ffffff;
          transition: all 0.2s;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb:hover {
          transform: scale(1.2);
          box-shadow: 0 0 15px rgba(167,139,250,0.8);
        }

        .slider-group select {
          background: rgba(30,30,60,0.85);
          color: #d0e0ff;
          border: 1px solid rgba(167,139,250,0.3);
          border-radius: 6px;
          padding: 3px 6px;
          font-size: 12px;
        }

        #btn-refresh-nebula {
          width: 100%;
          padding: 6px;
          margin-top: 4px;
          background: linear-gradient(135deg, rgba(167,139,250,0.25), rgba(100,80,180,0.25));
          border: 1px solid rgba(167,139,250,0.4);
          color: #d0e0ff;
          border-radius: 6px;
          cursor: pointer;
          font-size: 12px;
          transition: all 0.3s ease;
        }

        #btn-refresh-nebula:hover {
          background: linear-gradient(135deg, rgba(167,139,250,0.45), rgba(100,80,180,0.45));
          transform: translateY(-1px);
          box-shadow: 0 4px 12px rgba(167,139,250,0.3);
        }
      `;
      document.head.appendChild(style);
    }
  </script>

</body>
</html>
